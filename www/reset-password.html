<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘 - Reset Password</title>

  <link rel="stylesheet" href="./Trending.css" />
  <link rel="stylesheet" href="./auth-pages.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E">
</head>
<body>

<div class="background-glow"></div>

<div class="nav-main">

  <div class="auth-page-wrap">

    <div class="header">
      <a href="./MusicHome.html" class="brand-link"><h1 class="page-title">🎮 ♨𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘</h1></a>
      <p class="sub">Choose a new password</p>
    </div>

    <div class="auth-card" role="region" aria-label="Reset Password">
      <form id="reset-password-form" class="auth-form" autocomplete="off">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" name="newPassword" type="password" required minlength="6" placeholder="New password" />
        </div>

        <div id="reset-message" class="message" aria-live="polite"></div>

        <div class="actions">
          <button class="primary" type="submit" id="reset-submit-btn">Reset Password</button>
          <a class="secondary-link" href="./index.html">Back to log in</a>
        </div>
      </form>
    </div>

  </div>
</div>

<script src="./config.js"></script>
<script src="./auth.js"></script>
<script src="./reset-password.js"></script>
  <script src="/js/pwa-register.js"></script>
</body>
</html>
