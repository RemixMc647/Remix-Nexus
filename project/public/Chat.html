<body>

<div class="background-glow"></div>

<header class="nav-bar" style="width:92%; max-width:1300px; margin:25px auto;">
    <div class="logo">
        <h2>🎮 ♨𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘</h2>
        <span>Gaming Society</span>
    </div>

    <div class="buttons1">
        <a href="./GamingHome.html" class="href"><button class="button1" title="Home">🏠</button></a>
        <a href="./Trending.html" class="href"><button class="button2" title="Live">🔥</button></a>
        <a href="./Chat.html" class="href" aria-current="page"><button class="button3" title="Chat">💬</button></a>

        <a href="./Profile.html" class="href"><button class="button4" title="Profile">👤</button></a>
    </div>
</header>

<section class="chat-shell">

  <aside class="chat-rooms">
    <h2 class="chat-rooms-title">Rooms</h2>
    <div id="roomList" class="room-list"></div>

    <div class="new-room">
      <input id="newRoomName" type="text" placeholder="New room name…" maxlength="24">
      <button id="createRoomBtn">➕</button>
    </div>
  </aside>

  <main class="chat-main">
    <div class="chat-header">
      <h2 id="activeRoomName">Just Chatting Lounge</h2>
      <span id="connectionBadge" class="pill-badge">Connecting…</span>
    </div>

    <div id="messages" class="messages" aria-live="polite"></div>

    <form id="messageForm" class="message-form" autocomplete="off">
      <input id="messageInput" type="text" placeholder="Say something to the squad…" maxlength="500" required>
      <button type="submit">Send</button>
    </form>
  </main>

</section>

<footer class="footer">
    <h2>🎮 ♨𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘</h2>

<script src="./Chat.js"></script>
</body>
</html>
