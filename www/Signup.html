<body>

<div class="background-glow"></div>

<div class="nav-main">

  <div class="auth-page-wrap">

    <div class="header">
      <a href="./MusicHome.html" class="brand-link"><h1 class="page-title">🎮 ♨𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘</h1></a>
      <p class="sub">Create your gaming society account</p>
    </div>

    <div class="auth-card" role="region" aria-label="Sign up">
      <form id="signup-form" class="auth-form" autocomplete="off">
        <div class="field">
          <label for="signupUsername">Username</label>
          <input id="signupUsername" name="signupUsername" type="text" required minlength="3" maxlength="20" placeholder="Your chat name" />
        </div>

        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" name="signupEmail" type="email" required placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" name="signupPassword" type="password" required minlength="6" placeholder="At least 6 characters" />
        </div>

        <div id="signup-message" class="message" aria-live="polite"></div>

        <div class="actions">
          <button class="primary" type="submit" id="signup-submit-btn">Create account</button>
          <a class="secondary-link" href="./index.html">Already have an account? Log in</a>
        </div>
      </form>
    </div>

  </div>
</div>

<script src="./config.js"></script>
