<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings | Remix Nexus</title>

<link rel="stylesheet" href="Trending.css">
<link rel="stylesheet" href="Settings.css">
</head>

<body>

<header class="settings-header">
    <button onclick="history.back()">←</button>
    <h2>Settings</h2>
</header>

<div class="settings-container">

    <div class="setting-card" onclick="location.href='Profile.html'">
        👤
        <div>
            <h3>Account</h3>
            <p>Edit profile and account</p>
        </div>
    </div>

    <div class="setting-card" id="privacy" onclick="location.href='Privacy.html'">
        🔒
        <div>
            <h3>Privacy</h3>
            <p>Control who can contact you</p>
        </div>
    </div>

    <div class="setting-card" onclick="location.href='BlockedUsers.html'">
        🚫
        <div>
            <h3>Blocked Users</h3>
            <p>Manage blocked people</p>
        </div>
    </div>

    <div class="setting-card" id="clearChats">
        🗑️
        <div>
            <h3>Clear All Chats</h3>
            <p>Remove every conversation</p>
        </div>
    </div>

    <div class="setting-card" onclick="location.href='About.html'">
        ℹ️
        <div>
            <h3>About Remix Nexus</h3>
            <p>Version & Information</p>
        </div>
    </div>

    <div class="setting-card" onclick="location.href='Contact.html'">
        ❓
        <div>
            <h3>Help & Support</h3>
            <p>Need assistance?</p>
        </div>
    </div>

    <div class="setting-card" onclick="location.href='Terms.html'">
        📜
        <div>
            <h3>Terms & Privacy Policy</h3>
        </div>
    </div>

    <button class="logout-btn" id="logoutBtn">
        Logout
    </button>

</div>

<script src="auth.js"></script>
<script src="Settings.js"></script>

</body>
</html>
