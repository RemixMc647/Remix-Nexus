<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>𝕽𝖊𝖒𝖎𝖝 𝕹𝖊𝖝𝖚𝖘 - Gaming Society | Login</title>
<link rel="shortcut icon" href="./ChatGPT Image Jul 5, 2026, 12_51_40 AM.png" type="image/x-icon">
  <link rel="stylesheet" href="./Trending.css" />
  <link rel="stylesheet" href="./auth-pages.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E">
</head>
<body>

<div class="background-glow"></div>

<div class="nav-main">

  <div class="auth-page-wrap">

    <div class="header">
      <a href="./GamingHome.html" class="brand-link"><h1 class="page-title">🎮 ♨R∑MIXMC☯</h1></a>
      <p class="sub">Log in to your gaming society</p>
    </div>

    <div class="auth-card" role="region" aria-label="Login">
      <form id="login-form" class="auth-form" autocomplete="off">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="loginEmail" type="email" required placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="loginPassword" type="password" required minlength="6" placeholder="Your password" />
        </div>

        <div id="login-message" class="message" aria-live="polite"></div>

        <div class="actions">
          <button class="primary" type="submit" id="login-submit-btn">Log in</button>
          <a class="secondary-link" href="./Signup.html">Create an account</a>
        </div>
      </form>
    </div>

    <p style="margin-top:18px; opacity:.8; font-size:14px; text-align:center;">
      New here? <a href="./Signup.html" style="color:#7da9ff;">Sign up</a> to join chat rooms
      and connect with fans of the
      <a href="https://www.youtube.com/@remixmc-d6v" target="_blank" rel="noopener" style="color:#7da9ff;">RemixMC YouTube channel</a>.
    </p>

  </div>
</div>

<script src="./config.js"></script>
<script src="./auth.js"></script>
<script src="./index.js"></script>
</body>
</html>
